<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadsides! — Armada Builder</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1b2a;color:#e8e0d0;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
:root{
  --navy:#1B2A4A;--crimson:#8B1A1A;--gold:#C8961E;--sand:#F5F0E8;--mid:#D4C9B0;
  --t1:#4A4030;--t1bg:#2a2620;--t2:#7A5500;--t2bg:#2d2000;--t3:#7A1A10;--t3bg:#2a0d0a;
  --water:#0a3d5c;--water2:#0d4f78;
}

/* ── Top bar ── */
#topbar{background:#0f1e30;border-bottom:1px solid #1e3a5a;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#topbar h1{font-size:15px;font-weight:500;color:#c8961e;letter-spacing:.04em;}
#topbar .sub{font-size:11px;color:#6a8aaa;margin-left:4px;}
.stats-bar{display:flex;gap:16px;margin-left:auto;align-items:center;}
.stat-chip{font-size:11px;color:#8aadcc;background:#0d2a40;border:0.5px solid #1e3a5a;border-radius:6px;padding:3px 10px;}
.stat-chip span{color:#c8961e;font-weight:500;}

/* ── Layout ── */
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* ── Ship catalogue ── */
#catalogue{background:#0f1e30;border-bottom:1px solid #1e3a5a;padding:8px 12px;flex-shrink:0;}
#catalogue h2{font-size:11px;font-weight:500;color:#6a8aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
#tier-tabs{display:flex;gap:4px;margin-bottom:6px;}
.tier-tab{font-size:11px;padding:3px 10px;border-radius:99px;border:0.5px solid #1e3a5a;background:transparent;color:#6a8aaa;cursor:pointer;}
.tier-tab.active{background:#c8961e;color:#0f1e30;border-color:#c8961e;font-weight:500;}
#ship-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
#ship-scroll::-webkit-scrollbar{height:3px;}
#ship-scroll::-webkit-scrollbar-track{background:#0a1520;}
#ship-scroll::-webkit-scrollbar-thumb{background:#1e3a5a;border-radius:3px;}

.ship-chip{
  flex-shrink:0;background:#0d2a40;border:0.5px solid #1e3a5a;border-radius:8px;
  padding:7px 10px;cursor:grab;user-select:none;transition:border-color .15s,background .15s;
  min-width:120px;
}
.ship-chip:hover{border-color:#c8961e;background:#102e48;}
.ship-chip.dragging{opacity:.4;cursor:grabbing;}
.ship-chip .sc-name{font-size:12px;font-weight:500;color:#e8e0d0;white-space:nowrap;}
.ship-chip .sc-origin{font-size:10px;color:#6a8aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.ship-chip .sc-stats{display:flex;gap:6px;margin-top:4px;}
.sc-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:#0a1e30;border:0.5px solid #1e3a5a;color:#8aadcc;}
.sc-badge.t1{background:#1a1a0a;border-color:#4a4030;color:#a09060;}
.sc-badge.t2{background:#1a1000;border-color:#7a5500;color:#c89030;}
.sc-badge.t3{background:#1a0808;border-color:#7a1a10;color:#c86050;}

/* ── Main area: water + detail ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── Water ── */
#water-area{
  flex:1;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 60%,#0d4f78 0%,#0a3d5c 40%,#061e2e 100%);
}
#water-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#1e5a80;text-transform:uppercase;letter-spacing:.1em;pointer-events:none;}

.water-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(30,90,128,.15) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(30,90,128,.15) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;
}

#water-drop-zone{position:absolute;inset:0;}

/* ── Ship tokens in water ── */
.ship-token{
  position:absolute;cursor:pointer;user-select:none;
  background:#0f2a40;border:1.5px solid #1e5a80;border-radius:10px;
  padding:8px 12px;min-width:140px;
  transition:border-color .15s,box-shadow .15s;
}
.ship-token:hover{border-color:#c8961e;}
.ship-token.selected{border-color:#c8961e;box-shadow:0 0 0 2px rgba(200,150,30,.25);}
.ship-token .st-tier{font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.ship-token .st-name{font-size:13px;font-weight:500;color:#e8e0d0;}
.ship-token .st-ac{font-size:10px;color:#6a8aaa;margin-top:2px;}
.ship-token .st-delete{
  position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:4px;
  background:transparent;border:none;color:#6a8aaa;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
}
.ship-token .st-delete:hover{color:#c86050;background:#1a0808;}
.ship-token .st-systems{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.sys-pip{width:8px;height:8px;border-radius:2px;border:0.5px solid;flex-shrink:0;}

/* ── Detail panel ── */
#detail-panel{
  width:360px;flex-shrink:0;background:#0f1e30;border-left:1px solid #1e3a5a;
  display:flex;flex-direction:column;overflow:hidden;
}
#detail-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  color:#2a4a6a;
}
#detail-empty i{font-size:40px;}
#detail-empty p{font-size:12px;}
#detail-content{flex:1;overflow-y:auto;display:none;flex-direction:column;}
#detail-content::-webkit-scrollbar{width:4px;}
#detail-content::-webkit-scrollbar-track{background:#0a1520;}
#detail-content::-webkit-scrollbar-thumb{background:#1e3a5a;}

#detail-header{padding:12px 14px;border-bottom:1px solid #1e3a5a;flex-shrink:0;}
#detail-ship-name{font-size:15px;font-weight:500;color:#e8e0d0;}
#detail-ship-sub{font-size:11px;color:#6a8aaa;margin-top:1px;}
#detail-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px;flex-shrink:0;}
.ds-stat{background:#0a1e30;border-radius:6px;padding:6px 8px;border:0.5px solid #1e3a5a;}
.ds-stat .dsl{font-size:9px;color:#6a8aaa;text-transform:uppercase;letter-spacing:.05em;}
.ds-stat .dsv{font-size:13px;font-weight:500;color:#e8e0d0;}

#detail-systems{padding:0 14px 10px;flex:1;}
#detail-systems h3{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#6a8aaa;margin-bottom:8px;}

.system-section{margin-bottom:10px;}
.system-section-label{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}

.slot-row{display:flex;gap:6px;flex-wrap:wrap;}

.sys-slot{
  border:1px dashed #1e3a5a;border-radius:8px;padding:6px 10px;min-width:90px;
  font-size:11px;color:#2a4a6a;background:#08182a;cursor:pointer;
  transition:border-color .15s,background .15s;position:relative;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.sys-slot.filled{border-style:solid;border-color:#1e4a6a;background:#0a2234;color:#8aadcc;}
.sys-slot.filled .slot-name{font-size:11px;color:#c8d8e8;font-weight:500;}
.sys-slot.filled .slot-tier{font-size:9px;color:#4a8aaa;}
.sys-slot.drag-over{border-color:#c8961e;background:#102030;}
.sys-slot .slot-remove{position:absolute;top:2px;right:3px;font-size:10px;color:#4a6a8a;cursor:pointer;line-height:1;}
.sys-slot .slot-remove:hover{color:#c86050;}
.sys-slot.empty-slot .slot-icon{font-size:16px;color:#1e3a5a;}
.sys-slot.empty-slot:hover{border-color:#2e5a8a;background:#0a2234;color:#4a8aaa;}

/* ── System catalogue in detail ── */
#sys-catalogue{padding:0 14px 14px;border-top:1px solid #1e3a5a;flex-shrink:0;}
#sys-catalogue h3{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#6a8aaa;margin:8px 0 6px;}
#sys-cat-tabs{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap;}
.sys-cat-tab{font-size:10px;padding:2px 8px;border-radius:99px;border:0.5px solid #1e3a5a;background:transparent;color:#6a8aaa;cursor:pointer;}
.sys-cat-tab.active{background:#1e3a5a;color:#c8d8e8;}
#sys-list{display:flex;gap:5px;flex-wrap:wrap;max-height:100px;overflow-y:auto;}
#sys-list::-webkit-scrollbar{width:3px;}
#sys-list::-webkit-scrollbar-thumb{background:#1e3a5a;}

.sys-item{
  font-size:10px;padding:4px 8px;border-radius:6px;border:0.5px solid #1e3a5a;
  background:#08182a;color:#8aadcc;cursor:grab;user-select:none;
  transition:border-color .15s;white-space:nowrap;
}
.sys-item:hover{border-color:#c8961e;color:#c8d8e8;}
.sys-item.dragging{opacity:.4;}
.sys-item .si-tier{font-size:9px;color:#4a6a8a;}
.sys-item .si-name{font-weight:500;}

/* ── Trait box ── */
#detail-trait{padding:0 14px 10px;flex-shrink:0;}
#detail-trait .trait-box{background:#0a2234;border:0.5px solid #1e3a5a;border-radius:8px;padding:8px 10px;}
#detail-trait .trait-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#4a8aaa;margin-bottom:3px;}
#detail-trait .trait-text{font-size:11px;color:#8aadcc;line-height:1.5;}

/* ── Upgrade slots ── */
.upgrade-slot{
  border:1px dashed #1e3a5a;border-radius:8px;padding:5px 8px;
  font-size:11px;color:#2a4a6a;background:#08182a;cursor:pointer;
  transition:border-color .15s;flex:1;min-width:120px;position:relative;
}
.upgrade-slot.filled{border-style:solid;border-color:#4a3a1a;background:#1a1400;color:#c8961e;}
.upgrade-slot.filled .upg-name{font-size:11px;color:#c8b060;font-weight:500;}
.upgrade-slot.filled .upg-cost{font-size:9px;color:#6a5a30;}
.upgrade-slot.drag-over{border-color:#c8961e;}
.upgrade-slot .slot-remove{position:absolute;top:2px;right:3px;font-size:10px;color:#6a5a30;cursor:pointer;}
.upgrade-slot .slot-remove:hover{color:#c86050;}

/* ── Tier colour helpers ── */
.t1-color{color:#a09060;} .t2-color{color:#c89030;} .t3-color{color:#c86050;}
.t1-border{border-color:#4a4030;} .t2-border{border-color:#7a5500;} .t3-border{border-color:#7a1a10;}
</style>
</head>
<body>
<h2 class="sr-only">Broadsides! Armada Builder — drag ships into the water, select them to configure systems and upgrades</h2>

<div id="topbar">
  <h1>BROADSIDES! <span class="sub">Armada Builder</span></h1>
  <div class="stats-bar">
    <div class="stat-chip">Ships: <span id="stat-ships">0</span></div>
    <div class="stat-chip">Total HP: <span id="stat-hp">0</span></div>
    <div class="stat-chip">Fleet cost: <span id="stat-cost">0 gp</span></div>
  </div>
</div>

<div id="app">
  <div id="catalogue">
    <h2>Ship Catalogue — drag to water</h2>
    <div id="tier-tabs">
      <button class="tier-tab active" onclick="filterTier('all')">All</button>
      <button class="tier-tab" onclick="filterTier(0)">Tier 0</button>
      <button class="tier-tab" onclick="filterTier(1)">Tier 1</button>
      <button class="tier-tab" onclick="filterTier(2)">Tier 2</button>
      <button class="tier-tab" onclick="filterTier(3)">Tier 3</button>
    </div>
    <div id="ship-scroll"></div>
  </div>

  <div id="main">
    <div id="water-area">
      <div class="water-grid"></div>
      <div id="water-label">Your Armada</div>
      <div id="water-drop-zone"
        ondragover="waterDragOver(event)"
        ondragleave="waterDragLeave(event)"
        ondrop="waterDrop(event)">
      </div>
    </div>
    <div id="detail-panel">
      <div id="detail-empty">
        <i class="ti ti-anchor" aria-hidden="true"></i>
        <p>Select a ship to configure</p>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

function filterTier(t) {
  currentTierFilter = t;
  document.querySelectorAll('.tier-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCatalogue();
}

function renderCatalogue() {
  const scroll = document.getElementById('ship-scroll');
  const ships = currentTierFilter === 'all' ? SHIPS : SHIPS.filter(s => s.tier === currentTierFilter);
  scroll.innerHTML = ships.map(s => `
    <div class="ship-chip" draggable="true" data-ship-id="${s.id}"
      ondragstart="chipDragStart(event,'${s.id}')"
      ondragend="chipDragEnd(event)">
      <div class="sc-name">${s.name}</div>
      <div class="sc-origin">${s.origin}</div>
      <div class="sc-stats">
        <span class="sc-badge t${Math.min(s.tier,3)}">T${s.tier}</span>
        <span class="sc-badge">AC ${s.ac}</span>
        <span class="sc-badge">HP ${s.hp}</span>
        <span class="sc-badge">${s.speed}sq</span>
        <span class="sc-badge">${(s.cost).toLocaleString()}gp</span>
      </div>
    </div>`).join('');
}

function chipDragStart(e, shipId) {
  dragType = 'new-ship';
  dragSource = shipId;
  e.dataTransfer.effectAllowed = 'copy';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function chipDragEnd(e) {
  e.target.classList.remove('dragging');
  dragType = null;
  dragSource = null;
}

function waterDragOver(e) {
  if (dragType === 'new-ship' || dragType === 'move-ship') {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  }
}

function waterDragLeave(e) {}

function waterDrop(e) {
  e.preventDefault();
  if (dragType === 'new-ship') {
    const ship = SHIPS.find(s => s.id === dragSource);
    if (!ship) return;
    const rect = document.getElementById('water-area').getBoundingClientRect();
    const x = Math.max(10, Math.min(e.clientX - rect.left - 70, rect.width - 160));
    const y = Math.max(10, Math.min(e.clientY - rect.top - 40, rect.height - 90));
    const inst = {
      uid: Date.now() + Math.random(),
      shipId: ship.id,
      x, y,
      systems: {},
      upgrades: [],
    };
    Object.keys(ship.slots).forEach(k => {
      if (ship.slots[k] > 0) {
        inst.systems[k] = new Array(ship.slots[k]).fill(null);
      }
    });
    armada.push(inst);
    renderArmada();
    updateStats();
    selectShip(inst.uid);
  }
}

function renderArmada() {
  const zone = document.getElementById('water-drop-zone');
  const tokens = armada.map(inst => {
    const ship = SHIPS.find(s => s.id === inst.shipId);
    const tc = inst.shipId.includes('t') ? '' : '';
    const tierNum = Math.min(ship.tier, 3);
    const pipColors = Object.keys(inst.systems).flatMap(k =>
      inst.systems[k].map(v => v ? TYPE_COLORS[k] || '#888' : '#1e3a5a')
    ).slice(0,10);
    return `<div class="ship-token${selectedShipId===inst.uid?' selected':''}"
      style="left:${inst.x}px;top:${inst.y}px;"
      data-uid="${inst.uid}"
      onclick="selectShip('${inst.uid}')"
      onmousedown="tokenMouseDown(event,'${inst.uid}')">
      <div class="st-tier t${tierNum}-color">T${ship.tier} · ${ship.ac} AC</div>
      <div class="st-name">${ship.name}</div>
      <div class="st-ac">${ship.hp} HP · ${ship.speed}sq</div>
      <div class="st-systems">
        ${pipColors.map(c=>`<div class="sys-pip" style="background:${c}20;border-color:${c}"></div>`).join('')}
      </div>
      <button class="st-delete" onclick="deleteShip(event,'${inst.uid}')" title="Remove ship">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>`;
  }).join('');
  zone.innerHTML = tokens;
}

let draggingToken = null, tokenOffX = 0, tokenOffY = 0;

function tokenMouseDown(e, uid) {
  if (e.target.closest('.st-delete')) return;
  e.preventDefault();
  draggingToken = uid;
  const el = document.querySelector(`[data-uid="${uid}"]`);
  const rect = el.getBoundingClientRect();
  tokenOffX = e.clientX - rect.left;
  tokenOffY = e.clientY - rect.top;
  el.style.zIndex = 100;
  el.style.cursor = 'grabbing';
  document.addEventListener('mousemove', tokenMouseMove);
  document.addEventListener('mouseup', tokenMouseUp);
}

function tokenMouseMove(e) {
  if (!draggingToken) return;
  const el = document.querySelector(`[data-uid="${draggingToken}"]`);
  const waterRect = document.getElementById('water-area').getBoundingClientRect();
  const x = Math.max(0, Math.min(e.clientX - waterRect.left - tokenOffX, waterRect.width - 150));
  const y = Math.max(0, Math.min(e.clientY - waterRect.top - tokenOffY, waterRect.height - 80));
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const inst = armada.find(i => i.uid == draggingToken);
  if (inst) { inst.x = x; inst.y = y; }
}

function tokenMouseUp(e) {
  if (!draggingToken) return;
  const el = document.querySelector(`[data-uid="${draggingToken}"]`);
  if (el) { el.style.zIndex = ''; el.style.cursor = ''; }
  draggingToken = null;
  document.removeEventListener('mousemove', tokenMouseMove);
  document.removeEventListener('mouseup', tokenMouseUp);
}

function selectShip(uid) {
  selectedShipId = uid;
  renderArmada();
  renderDetail();
}

function deleteShip(e, uid) {
  e.stopPropagation();
  armada = armada.filter(i => i.uid != uid);
  if (selectedShipId == uid) {
    selectedShipId = null;
    renderDetail();
  }
  renderArmada();
  updateStats();
}

function renderSystemSlots(inst, ship) {
  const slotTypes = [
    {key:'helm',label:'Helm',icon:'ti-steering-wheel'},
    {key:'cannon',label:'Cannons',icon:'ti-circle-dot'},
    {key:'focus',label:'Arcane focus',icon:'ti-crystal-ball'},
    {key:'harpoon',label:'Harpoon',icon:'ti-hook'},
    {key:'nest',label:"Crow's nest",icon:'ti-binoculars'},
    {key:'rigger',label:"Rigger's kit",icon:'ti-tool'},
  ];
  return slotTypes.map(({key,label,icon}) => {
    const count = ship.slots[key] || 0;
    if (!count) return '';
    const slots = inst.systems[key] || [];
    return `<div class="system-section">
      <div class="system-section-label"><i class="ti ${icon}" aria-hidden="true" style="font-size:11px;margin-right:3px;color:${TYPE_COLORS[key]}"></i>${label}</div>
      <div class="slot-row">
        ${Array.from({length:count},(_,i) => {
          const sys = slots[i];
          if (sys) {
            const sysData = findSystem(sys);
            return `<div class="sys-slot filled t${sysData?sysData.tier:1}-border"
              ondragover="slotDragOver(event)" ondragleave="slotDragLeave(event)"
              ondrop="slotDrop(event,'${key}',${i})"
              title="Click × to remove">
              <span class="slot-tier">${sysData?'T'+sysData.tier:''}</span>
              <span class="slot-name">${sysData?sysData.name:sys}</span>
              <span class="slot-remove" onclick="removeFromSlot('${key}',${i})">×</span>
            </div>`;
          } else {
            return `<div class="sys-slot empty-slot"
              ondragover="slotDragOver(event)" ondragleave="slotDragLeave(event)"
              ondrop="slotDrop(event,'${key}',${i})">
              <i class="ti ti-plus slot-icon" aria-hidden="true"></i>
              <span style="font-size:10px;color:#2a4a6a;">empty</span>
            </div>`;
          }
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderUpgradeSlots(inst) {
  const MAX_UPG = 4;
  const slots = inst.upgrades || [];
  const rows = [];
  for (let i = 0; i < MAX_UPG; i++) {
    const upg = slots[i];
    if (upg) {
      const upgData = UPGRADES.find(u => u.id === upg);
      rows.push(`<div class="upgrade-slot filled"
        ondragover="upgDragOver(event)" ondragleave="upgDragLeave(event)"
        ondrop="upgDrop(event,${i})">
        <span class="slot-remove" onclick="removeUpgrade(${i})">×</span>
        <span class="upg-name">${upgData?upgData.name:upg}</span>
        <span class="upg-cost">${upgData?(upgData.cost.toLocaleString()+' gp'):''}</span>
      </div>`);
    } else {
      rows.push(`<div class="upgrade-slot"
        ondragover="upgDragOver(event)" ondragleave="upgDragLeave(event)"
        ondrop="upgDrop(event,${i})">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:12px;color:#2a4a6a;"></i>
        <span style="color:#2a4a6a;font-size:10px;"> upgrade slot</span>
      </div>`);
    }
  }
  return `<div class="slot-row">${rows.join('')}</div>`;
}

function renderSysItems() {
  if (currentSysCat === 'upgrade') {
    return UPGRADES.map(u => `
      <div class="sys-item" draggable="true"
        ondragstart="sysItemDragStart(event,'${u.id}','upgrade')"
        ondragend="sysItemDragEnd(event)">
        <span class="si-name">${u.name}</span>
        <span class="si-tier" style="display:block;color:#6a5a30;">${u.type} · ${u.cost.toLocaleString()}gp</span>
      </div>`).join('');
  }
  const items = SYSTEMS[currentSysCat] || [];
  return items.map(s => `
    <div class="sys-item" draggable="true"
      ondragstart="sysItemDragStart(event,'${s.id}','${s.type}')"
      ondragend="sysItemDragEnd(event)">
      <span class="si-tier t${s.tier}-color">T${s.tier}</span>
      <span class="si-name" style="margin-left:4px;">${s.name}</span>
      <span class="si-tier" style="display:block;color:#4a6a8a;">${s.cost.toLocaleString()} gp</span>
    </div>`).join('');
}

function setSysCat(cat) {
  currentSysCat = cat;
  renderDetail();
}

let dragSysId = null, dragSysType = null;

function sysItemDragStart(e, id, type) {
  dragSysId = id;
  dragSysType = type;
  e.dataTransfer.effectAllowed = 'copy';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function sysItemDragEnd(e) {
  e.target.classList.remove('dragging');
  dragSysId = null;
  dragSysType = null;
}

function slotDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function slotDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function slotDrop(e, slotKey, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragSysId || !selectedShipId) return;
  if (dragSysType !== slotKey) {
    flashSlot(e.currentTarget);
    return;
  }
  const inst = armada.find(i => i.uid == selectedShipId);
  if (!inst) return;
  if (!inst.systems[slotKey]) inst.systems[slotKey] = [];
  const existing = inst.systems[slotKey][idx];
  if (existing === dragSysId) return;
  inst.systems[slotKey][idx] = dragSysId;
  renderDetail();
  renderArmada();
  updateStats();
}

function upgDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function upgDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function upgDrop(e, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragSysId || dragSysType !== 'upgrade' || !selectedShipId) return;
  const inst = armada.find(i => i.uid == selectedShipId);
  if (!inst) return;
  if (!inst.upgrades) inst.upgrades = [];
  while (inst.upgrades.length <= idx) inst.upgrades.push(null);
  inst.upgrades[idx] = dragSysId;
  renderDetail();
  updateStats();
}

function removeFromSlot(slotKey, idx) {
  const inst = armada.find(i => i.uid == selectedShipId);
  if (!inst || !inst.systems[slotKey]) return;
  inst.systems[slotKey][idx] = null;
  renderDetail();
  renderArmada();
  updateStats();
}

function removeUpgrade(idx) {
  const inst = armada.find(i => i.uid == selectedShipId);
  if (!inst || !inst.upgrades) return;
  inst.upgrades[idx] = null;
  renderDetail();
  updateStats();
}

function flashSlot(el) {
  el.style.borderColor = '#c86050';
  el.style.background = '#1a0808';
  setTimeout(() => {
    el.style.borderColor = '';
    el.style.background = '';
  }, 400);
}

function findSystem(id) {
  for (const cat of Object.values(SYSTEMS)) {
    const found = cat.find(s => s.id === id);
    if (found) return found;
  }
  return null;
}

function updateStats() {
  const count = armada.length;
  const totalHp = armada.reduce((sum, inst) => {
    const ship = SHIPS.find(s => s.id === inst.shipId);
    return sum + (ship ? ship.hp : 0);
  }, 0);
  const totalCost = armada.reduce((sum, inst) => {
    const ship = SHIPS.find(s => s.id === inst.shipId);
    let c = ship ? ship.cost : 0;
    Object.values(inst.systems).forEach(slots => {
      slots.forEach(sysId => {
        if (sysId) {
          const sys = findSystem(sysId);
          if (sys) c += sys.cost;
        }
      });
    });
    (inst.upgrades || []).forEach(upgId => {
      if (upgId) {
        const upg = UPGRADES.find(u => u.id === upgId);
        if (upg) c += upg.cost;
      }
    });
    return sum + c;
  }, 0);
  document.getElementById('stat-ships').textContent = count;
  document.getElementById('stat-hp').textContent = totalHp.toLocaleString();
  document.getElementById('stat-cost').textContent = totalCost.toLocaleString() + ' gp';
}

renderCatalogue();
renderDetail();
updateStats();
</script>
</body>
</html>
